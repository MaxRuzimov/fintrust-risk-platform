apiVersion: apps/v1
kind: Deployment
metadata:
  name: fintrust-transaction-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fintrust-transaction-api
  template:
    metadata:
      labels:
        app: fintrust-transaction-api
    spec:
      containers:
        - name: transaction-api
          image: fintrust/transaction-producer-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: fintrust-transaction-api-config
            - secretRef:
                name: fintrust-eventhub-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10