# resources/jobs.yml  —  1.7 + 1.9 final
#
# 1.7: each job defines its own job-cluster (born-runs-dies), no hardcoded
#      existing_cluster_id. Two profiles:
#        streaming_cluster : ON_DEMAND + fixed workers  (reliability)
#        batch_cluster     : SPOT w/ fallback + autoscale (cost)
# 1.9: each new_cluster references the matching cluster POLICY via policy_id.
#        streaming_cluster -> streaming_policy (forces ON_DEMAND, fixed workers)
#        batch_cluster     -> batch_policy     (forces SPOT, autoscale, autoterm)
#
# Rule of thumb: job_cluster_key name, the settings, and the policy_id must all
# agree. streaming_cluster + ON_DEMAND must point at streaming_policy — pointing
# it at batch_policy fails, because batch_policy locks availability to SPOT.

resources:
  jobs:

    # -- BATCH: customer master ------------------------------------------------
    fintrust_customer_master:
      name: fintrust_customer_master
      job_clusters:
        - job_cluster_key: batch_cluster
          new_cluster:
            policy_id: ${resources.cluster_policies.batch_policy.id}
            spark_version: "15.4.x-scala2.12"
            node_type_id: "Standard_D4s_v3"
            autoscale:
              min_workers: 1
              max_workers: 4
            azure_attributes:
              availability: SPOT_WITH_FALLBACK_AZURE
      tasks:
        - task_key: customers_autoloader_to_bronze
          job_cluster_key: batch_cluster
          notebook_task:
            notebook_path: ../notebooks/01_loaders/00_autoloader_generic.py
            base_parameters: {env: dev, source_name: customers}

        - task_key: customers_scd2
          depends_on: [{task_key: customers_autoloader_to_bronze}]
          job_cluster_key: batch_cluster
          notebook_task:
            notebook_path: ../notebooks/02_transform_silver/02_customers_scd2.py
            base_parameters: {env: dev}

        - task_key: reconciliation_checks
          depends_on: [{task_key: customers_scd2}]
          job_cluster_key: batch_cluster
          notebook_task:
            notebook_path: ../notebooks/04_quality_audit/01_reconciliation_checks.py
            base_parameters: {env: dev}

    # -- BATCH: exchange rates -------------------------------------------------
    fintrust_exchange_rates:
      name: fintrust_exchange_rates
      job_clusters:
        - job_cluster_key: batch_cluster
          new_cluster:
            policy_id: ${resources.cluster_policies.batch_policy.id}
            spark_version: "15.4.x-scala2.12"
            node_type_id: "Standard_D4s_v3"
            autoscale: {min_workers: 1, max_workers: 4}
            azure_attributes: {availability: SPOT_WITH_FALLBACK_AZURE}
      tasks:
        - task_key: exchange_rates_autoloader_to_bronze
          job_cluster_key: batch_cluster
          notebook_task:
            notebook_path: ../notebooks/01_loaders/00_autoloader_generic.py
            base_parameters: {env: dev, source_name: exchange_rates}

        - task_key: exchange_rates_to_silver
          depends_on: [{task_key: exchange_rates_autoloader_to_bronze}]
          job_cluster_key: batch_cluster
          notebook_task:
            notebook_path: ../notebooks/02_transform_silver/03_exchange_rates_to_silver.py
            base_parameters: {env: dev}

    # -- STREAMING: transactions (bronze + silver) -----------------------------
    fintrust_streaming_transactions:
      name: fintrust_streaming_transactions
      max_concurrent_runs: 1
      job_clusters:
        - job_cluster_key: streaming_cluster
          new_cluster:
            policy_id: ${resources.cluster_policies.streaming_policy.id}
            spark_version: "15.4.x-scala2.12"
            node_type_id: "Standard_D4s_v3"
            num_workers: 2
            azure_attributes:
              availability: ON_DEMAND_AZURE
      tasks:
        - task_key: transactions_eventhub_to_bronze
          job_cluster_key: streaming_cluster
          notebook_task:
            notebook_path: ../notebooks/01_loaders/01_transactions_eventhub_to_bronze.py
            base_parameters: {env: dev}

        - task_key: transactions_to_silver
          job_cluster_key: streaming_cluster
          notebook_task:
            notebook_path: ../notebooks/02_transform_silver/01_transactions_to_silver.py
            base_parameters: {env: dev}

    # -- STREAMING: fraud alerts -----------------------------------------------
    fintrust_fraud_alerts_stream:
      name: fintrust_fraud_alerts_stream
      max_concurrent_runs: 1
      job_clusters:
        - job_cluster_key: streaming_cluster
          new_cluster:
            policy_id: ${resources.cluster_policies.streaming_policy.id}
            spark_version: "15.4.x-scala2.12"
            node_type_id: "Standard_D4s_v3"
            num_workers: 2
            azure_attributes: {availability: ON_DEMAND_AZURE}
      tasks:
        - task_key: fraud_alerts_to_bronze
          job_cluster_key: streaming_cluster
          notebook_task:
            notebook_path: ../notebooks/01_loaders/04_fraud_alerts_autoloader_to_bronze.py
            base_parameters: {env: dev}

    # -- STREAMING: transactions + fraud join (stateful, heavier) --------------
    fintrust_transactions_fraud_stream:
      name: fintrust_transactions_fraud_stream
      max_concurrent_runs: 1
      job_clusters:
        - job_cluster_key: streaming_cluster
          new_cluster:
            policy_id: ${resources.cluster_policies.streaming_policy.id}
            spark_version: "15.4.x-scala2.12"
            node_type_id: "Standard_D8s_v3"
            num_workers: 2
            azure_attributes: {availability: ON_DEMAND_AZURE}
      tasks:
        - task_key: transactions_with_fraud_alerts
          job_cluster_key: streaming_cluster
          notebook_task:
            notebook_path: ../notebooks/03_transform_gold/04_transactions_with_fraud_alerts.py
            base_parameters: {env: dev}

    # -- BATCH: gold reporting -------------------------------------------------
    fintrust_gold_reporting:
      name: fintrust_gold_reporting
      job_clusters:
        - job_cluster_key: batch_cluster
          new_cluster:
            policy_id: ${resources.cluster_policies.batch_policy.id}
            spark_version: "15.4.x-scala2.12"
            node_type_id: "Standard_D4s_v3"
            autoscale: {min_workers: 2, max_workers: 6}
            azure_attributes: {availability: SPOT_WITH_FALLBACK_AZURE}
      tasks:
        - task_key: transactions_enriched
          job_cluster_key: batch_cluster
          notebook_task:
            notebook_path: ../notebooks/03_transform_gold/01_transactions_enriched.py
            base_parameters: {env: dev}

        - task_key: daily_transaction_summary
          depends_on: [{task_key: transactions_enriched}]
          job_cluster_key: batch_cluster
          notebook_task:
            notebook_path: ../notebooks/03_transform_gold/02_daily_transaction_summary.py
            base_parameters: {env: dev}

        - task_key: fraud_risk_summary
          depends_on: [{task_key: daily_transaction_summary}]
          job_cluster_key: batch_cluster
          notebook_task:
            notebook_path: ../notebooks/03_transform_gold/03_fraud_risk_summary.py
            base_parameters: {env: dev}